<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список книг</title>
</head>
<body>
<h1>Доступные книги</h1>
<ul>
    <#list books as book>
    <li>
        <strong>${book.title}</strong> — ${book.author} <br>
        Статус: ${book.status} <br>
        <#if book.currentHolderId??>Кто взял (ID): ${book.currentHolderId}</#if>
    </li>
    <hr>
</#list>
</ul>
</body>
</html>
