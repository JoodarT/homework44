<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль пользователя</title>
    <link rel="stylesheet" href="/css/forms.css">
    <style>
        .profile-container { max-width: 500px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: sans-serif; }
        .profile-header { border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .info-group { margin-bottom: 15px; font-size: 16px; }
        .info-label { font-weight: bold; color: #555; }
        .btn-logout { display: inline-block; margin-top: 20px; padding: 10px 15px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="profile-header">
        <h2>Профиль сотрудника</h2>
    </div>

    <div class="info-group">
        <span class="info-label">Имя / ФИО:</span>
        <span>${name}</span>
    </div>

    <div class="info-group">
        <span class="info-label">Электронная почта:</span>
        <span>${email}</span>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <a href="/login" class="btn-logout">Выйти / На главную</a>
</div>

</body>
</html>
