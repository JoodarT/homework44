<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация нового сотрудника</title>
    <link rel="stylesheet" href="/css/forms.css">
    <style>
        .form-container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        .error { color: red; margin-bottom: 15px; }
        .success { color: green; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Регистрация сотрудника</h2>

    <#if error??>
    <div class="error">${error}</div>
</#if>

<#if success??>
<div class="success">${success}</div>
</#if>

<form action="/register" method="POST">
    <div class="form-group">
        <label for="name">ФИО сотрудника:</label>
        <input type="text" id="name" name="name" required placeholder="Абдышукур Абдысаматов Абдысаматович">
    </div>

    <div class="form-group">
        <label for="email">Электронная почта (Email):</label>
        <input type="email" id="email" name="email" required placeholder="example@mail.com">
    </div>

    <button type="submit" class="btn">Зарегистрироваться</button>
</form>

<p style="margin-top: 15px;"><a href="/login">Уже зарегистрированы? Войти</a></p>
</div>

</body>
</html>
